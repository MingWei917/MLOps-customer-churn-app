name: MLOps App CI/CD (Customer Churn)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Triggered automatically when MLOps-infra updates infrastructure
  repository_dispatch:
    types: [infra-updated]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    
    # These secrets are automatically injected by MLOps-infra
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MINIO_S3_ENDPOINT: ${{ secrets.MINIO_S3_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ROOT_USER }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_ROOT_PASSWORD }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]" mlflow

      - name: Configure DVC Remote (MinIO)
        run: |
          # Add remote (force overwrite if exists locally)
          dvc remote add -f minio_remote s3://mlops-artifacts
          dvc remote default minio_remote
          
          # Inject MinIO credentials from MLOps-infra secrets
          dvc remote modify minio_remote endpointurl $MINIO_S3_ENDPOINT
          dvc remote modify minio_remote access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify minio_remote secret_access_key $AWS_SECRET_ACCESS_KEY
          dvc remote modify minio_remote use_ssl false
          dvc remote modify minio_remote addressing_style path

      - name: Ensure MinIO Bucket Exists
        run: |
          # Create the bucket if it doesn't exist yet (idempotent)
          aws s3 mb s3://mlops-artifacts --endpoint-url $MINIO_S3_ENDPOINT || echo "Bucket already exists"

      - name: Pull Data & Artifacts from MinIO
        run: dvc pull

      - name: Run DVC Pipeline (Ingest, Train, Evaluate)
        # This executes the stages defined in your dvc.yaml
        run: dvc repro 

      - name: Push Updated Models & Metrics to MinIO
        # Only push back to storage if we are on the main branch (not on PRs)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dvc push