name: MLOps App CI/CD (Customer Churn)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Triggered automatically when MLOps-infra updates infrastructure
  repository_dispatch:
    types: [infra-updated]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    
    # DagsHub Secrets injected by MLOps-infra
    env:
      # MLflow Tracking Credentials
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      
      # DVC S3-Compatible Storage Credentials
      DVC_S3_ENDPOINT_URL: ${{ secrets.DVC_S3_ENDPOINT_URL }}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]" mlflow

      - name: Configure DVC Remote (DagsHub)
        run: |
          # DagsHub requires the bucket name to ALWAYS be 'dvc'
          dvc remote add -f origin s3://dvc
          dvc remote default origin
          
          # Set the endpoint URL from your GitHub secrets
          dvc remote modify origin endpointurl $DVC_S3_ENDPOINT_URL
          
          # Inject DagsHub credentials securely into the local config
          dvc remote modify origin --local access_key_id $DAGSHUB_TOKEN
          dvc remote modify origin --local secret_access_key $DAGSHUB_TOKEN

      # DagsHub automatically provisions the S3 bucket when the repo is created.

      - name: Pull Data & Artifacts from DagsHub
        run: dvc pull

      - name: Run DVC Pipeline (Ingest, Train, Evaluate)
        # The MLFLOW_TRACKING_* env vars are automatically picked up by the MLflow Python SDK
        run: dvc repro 

      - name: Push Updated Models & Metrics to DagsHub
        # Only push back to storage if we are on the main branch (not on PRs)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dvc push