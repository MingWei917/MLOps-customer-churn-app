model:
  name: xgboost
  params:
    # Boosting parameters
    n_estimators: 500                # Number of trees (will stop early if early_stopping enabled)
    learning_rate: 0.005              # Reduced from 0.05 for better generalization
    
    # Tree structure
    max_depth: 3                     # Reduced from 6 to prevent overfitting
    min_child_weight: 10              # Minimum sum of instance weight in a child
    
    # Regularization (prevents overfitting)
    gamma: 1.0                       # Minimum loss reduction for split
    reg_alpha: 5.0                   # L1 regularization term on weights (Lasso)
    reg_lambda: 10.0                  # L2 regularization term on weights (Ridge)
    
    # Sampling (adds randomness to prevent overfitting)
    subsample: 0.6                   # Sample 80% of training data for each tree
    colsample_bytree: 0.8            # Sample 80% of features for each tree
    colsample_bylevel: 0.8           # Sample 80% of features for each level
    
    # Class imbalance handling
    # Options:
    #   - Specific number (e.g., 3.0): Use this exact value
    #   - "auto": Calculate automatically from training data
    #   - 1: No class weighting (not recommended for imbalanced data)
    scale_pos_weight: auto           # Will be calculated from your data!
    
    # Evaluation metrics
    eval_metric: auc                 # Primary metric: Area Under ROC Curve
                                     # Other options: logloss, error, aucpr
    
    # Early stopping
    early_stopping_rounds: 50        # Stop if no improvement for 50 rounds
    
    # Performance optimization
    tree_method: hist                # Histogram-based algorithm (faster)
    
    # Reproducibility
    random_state: 42
    
    # Advanced options (uncomment to use)
    # n_jobs: -1                     # Use all CPU cores
    # max_bin: 256                   # Number of bins for histogram
    # verbosity: 1                   # 0=silent, 1=warning, 2=info, 3=debug


training:
  test_size: 0.2
  stratify: true

output:
  model_path: models/model.pkl
  metrics_path: metrics/metrics.json


